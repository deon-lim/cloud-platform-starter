name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: cloud-platform-starter
  ECS_CLUSTER_PRODUCTION: cloud-platform-cluster
  ECS_SERVICE_PRODUCTION: cloud-platform-service
  ECS_TASK_FAMILY_PRODUCTION: cloud-platform-task
  ECS_CLUSTER_STAGING: cloud-platform-cluster-staging
  ECS_SERVICE_STAGING: cloud-platform-service-staging
  ECS_TASK_FAMILY_STAGING: cloud-platform-task-staging

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./app

      - name: Run lint
        run: npm run lint
        working-directory: ./app

      - name: Run tests
        run: npm test
        working-directory: ./app

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Check ECR image scan results
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Waiting for ECR scan to complete..."
          sleep 30

          SCAN_STATUS=""
          ATTEMPTS=0

          while [ "$SCAN_STATUS" != "COMPLETE" ] && [ $ATTEMPTS -lt 10 ]; do
            SCAN_STATUS=$(aws ecr describe-image-scan-findings \
              --repository-name $ECR_REPOSITORY \
              --image-id imageTag=$IMAGE_TAG \
              --region $AWS_REGION \
              --query 'imageScanStatus.status' \
              --output text 2>/dev/null || echo "PENDING")
            echo "Scan status: $SCAN_STATUS"
            ATTEMPTS=$((ATTEMPTS + 1))
            sleep 10
          done

          if [ "$SCAN_STATUS" != "COMPLETE" ]; then
            echo "Scan did not complete in time. Proceeding with caution."
            exit 0
          fi

          CRITICAL=$(aws ecr describe-image-scan-findings \
            --repository-name $ECR_REPOSITORY \
            --image-id imageTag=$IMAGE_TAG \
            --region $AWS_REGION \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' \
            --output text)

          HIGH=$(aws ecr describe-image-scan-findings \
            --repository-name $ECR_REPOSITORY \
            --image-id imageTag=$IMAGE_TAG \
            --region $AWS_REGION \
            --query 'imageScanFindings.findingSeverityCounts.HIGH' \
            --output text)

          echo "Critical vulnerabilities: ${CRITICAL:-0}"
          echo "High vulnerabilities: ${HIGH:-0}"

          if [ "$CRITICAL" != "None" ] && [ "$CRITICAL" != "0" ] && [ ! -z "$CRITICAL" ]; then
            echo "❌ Pipeline failed: $CRITICAL critical vulnerabilities found in image"
            exit 1
          fi

          echo "✅ No critical vulnerabilities found. Proceeding with deployment."

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download staging task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY_STAGING \
            --query taskDefinition \
            --output json > task-definition-staging.json

      - name: Update staging task definition with new image
        id: update-task-def-staging
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-staging.json
          container-name: app
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.update-task-def-staging.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_STAGING }}
          cluster: ${{ env.ECS_CLUSTER_STAGING }}
          wait-for-service-stability: true

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download production task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY_PRODUCTION \
            --query taskDefinition \
            --output json > task-definition-production.json

      - name: Update production task definition with new image
        id: update-task-def-production
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-production.json
          container-name: app
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to production
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.update-task-def-production.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_PRODUCTION }}
          cluster: ${{ env.ECS_CLUSTER_PRODUCTION }}
          wait-for-service-stability: true